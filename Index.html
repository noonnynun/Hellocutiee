<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello.cutieee</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #fafaf8; --surface: #ffffff; --border: #e8e6e1; --text: #1a1a18;
    --muted: #8a887f; --accent: #c8a97e; --accent-soft: #f5efe6; --tag-bg: #f0ede8;
    --danger: #c0392b; --success: #2d7a4f; --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
    --ig-color: #e1306c;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }
  .site-header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; gap: 20px; }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; letter-spacing: 0.02em; color: var(--text); white-space: nowrap; flex-shrink: 0; }
  .logo span { color: var(--accent); }
  .search-wrap { flex: 1; max-width: 520px; position: relative; }
  .search-input { width: 100%; padding: 10px 16px 10px 40px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); font-size: 14px; color: var(--text); outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .header-actions { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .count-badge { font-size: 12px; color: var(--muted); background: var(--tag-bg); padding: 4px 10px; border-radius: 20px; }
  .category-bar { background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .category-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; gap: 2px; }
  .cat-btn { padding: 12px 18px; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.18s; }
  .cat-btn.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 500; }
  .filter-bar { max-width: 1200px; margin: 20px auto 0; padding: 0 24px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .filter-label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
  .size-btn { padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px; background: none; font-size: 12px; color: var(--muted); cursor: pointer; font-weight: 500; }
  .size-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .clear-btn { font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 5px 8px; text-decoration: underline; display: none; }
  .clear-btn.visible { display: block; }
  .shop-view { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
  .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: transform 0.18s, box-shadow 0.18s; cursor: pointer; }
  .product-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .card-img { width: 100%; aspect-ratio: 1; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .card-img img { width: 100%; height: 100%; object-fit: cover; }
  .card-img-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--accent); }
  .card-img-placeholder span { font-size: 11px; color: var(--muted); }
  .card-size-tag { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.92); font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; }
  .card-body { padding: 14px 14px 16px; }
  .card-cat { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 600; margin-bottom: 5px; }
  .card-name { font-size: 13px; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
  .card-meta { display: flex; justify-content: space-between; align-items: center; }
  .card-dims { font-size: 11px; color: var(--muted); }
  .card-price { font-size: 15px; font-weight: 600; }
  .card-price.no-price { font-size: 12px; color: var(--muted); font-weight: 400; }
  .card-id { font-size: 10px; color: #ccc; margin-top: 4px; }
  .no-results, .loading { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
  
  /* MODAL (หน้าต่างรายละเอียดสินค้าตอนคลิกรูป) */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; backdrop-filter: blur(2px); align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 14px; max-width: 520px; width: 100%; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
  .modal-img { width: 100%; aspect-ratio: 1; background: var(--accent-soft); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .modal-img img { width: 100%; height: 100%; object-fit: cover; }
  .modal-img-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--muted); }
  .modal-close { position: absolute; top: 14px; right: 14px; background: rgba(255,255,255,0.9); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; z-index: 10; }
  .modal-body { padding: 24px; }
  .modal-cat { font-size: 11px; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 6px; }
  .modal-name { font-size: 20px; font-family: 'Playfair Display', serif; margin-bottom: 14px; }
  .modal-specs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .spec-item { background: var(--bg); border-radius: 8px; padding: 12px; text-align: center; }
  .spec-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .spec-val { font-size: 16px; font-weight: 600; }
  .modal-price-row { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--border); padding-top: 16px; margin-bottom: 20px; }
  .modal-price { font-size: 24px; font-weight: 600; }
  .modal-price.no-price { font-size: 14px; color: var(--muted); }
  .modal-code { font-size: 11px; color: var(--muted); margin-top: 4px; }
  
  /* ปุ่มลิงก์ไอจีในหน้าต่างรายละเอียด */
  .ig-btn-wrap { display: none; }
  .ig-btn-wrap.visible { display: block; }
  .ig-go-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; background: var(--ig-color); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none; text-align: center; transition: opacity 0.2s; box-shadow: 0 4px 12px rgba(225, 48, 108, 0.2); }
  .ig-go-btn:hover { opacity: 0.9; }

  @media (max-width: 600px) {
    .header-inner { height: auto; padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    .search-wrap { order: 2; max-width: 100%; width: 100%; }
    .product-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .shop-view { padding: 16px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">Hello<span>.</span>cutieee</div>
    <div class="search-wrap">
      <input type="text" class="search-input" id="search-input" placeholder="ค้นหาเสื้อ เช่น มิกกี้, คิตตี้, สีชมพู..." oninput="filterProducts()">
    </div>
    <div class="header-actions">
      <span class="count-badge" id="result-count">กำลังโหลด...</span>
    </div>
  </div>
</header>

<nav class="category-bar">
  <div class="category-inner" id="cat-inner"></div>
</nav>

<div class="filter-bar">
  <span class="filter-label">ไซซ์</span>
  <div id="size-filters"></div>
  <button class="clear-btn" id="clear-size" onclick="clearSize()">ล้างตัวกรอง</button>
</div>

<div class="shop-view">
  <div class="product-grid" id="product-grid">
    <div class="loading">กำลังดึงข้อมูลสินค้าจากระบบ...</div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-img" id="modal-img">
      <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">×</button>
      <div class="modal-img-placeholder" id="modal-placeholder">
        <span>คลิกปุ่มด้านล่างเพื่อดูรายละเอียดเพิ่มเติมบน Instagram</span>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-cat" id="modal-cat"></div>
      <div class="modal-name" id="modal-name"></div>
      
      <div class="modal-specs">
        <div class="spec-item"><div class="spec-label">ไซซ์</div><div class="spec-val" id="m-size">—</div></div>
        <div class="spec-item"><div class="spec-label">อก</div><div class="spec-val" id="m-chest">—</div></div>
        <div class="spec-item"><div class="spec-label">ยาว</div><div class="spec-val" id="m-length">—</div></div>
      </div>
      
      <div class="modal-price-row">
        <div>
          <div class="modal-price" id="m-price"></div>
          <div class="modal-code" id="m-code"></div>
        </div>
      </div>
      
      <div class="ig-btn-wrap" id="ig-btn-container">
        <a id="modal-ig-link" class="ig-go-btn" href="#" target="_blank">
          📸 ดูเพิ่มเติมในไอจี ↗
        </a>
      </div>
    </div>
  </div>
</div>

<script>
// แก้ไขรูปแบบการลิงก์ให้ดึงข้อมูลคอลัมน์ J (ig) ได้สมบูรณ์แบบ
const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/117p7w38cFd6UKuZ_JYreRsI6oUFl4XjlO_OezCzMZ5c/export?format=csv&id=117p7w38cFd6UKuZ_JYreRsI6oUFl4XjlO_OezCzMZ5c";

let products = [];
let selectedCat = 'ทั้งหมด';
let selectedSize = '';

// รายการหมวดหมู่ปุ่มกดหน้าร้าน
const CATS = ['ทั้งหมด','มิกกี้และเพื่อนๆ','ซานริโอ/แครแบร','สัตวในดิสนีย','เจาหญิง','สตอเบอรรี่','ไนทแมร/ผีนอย/เจาสาว','อื่นๆ'];
const CAT_LABELS = {
  'ทั้งหมด':'ทั้งหมด', 'มิกกี้และเพื่อนๆ':'🐭 มิกกี้และเพื่อนๆ', 'ซานริโอ/แครแบร':'🎀 ซานริโอ',
  'สัตวในดิสนีย':'🦁 สัตว์ดิสนีย์', 'เจาหญิง':'👸 เจ้าหญิง', 'สตอเบอรรี่':'🍓 สตรอเบอร์รี่',
  'ไนทแมร/ผีนอย/เจาสาว':'🎃 ไนท์แมร์', 'อื่นๆ':'✨ อื่นๆ'
};

async function loadProductsFromSheet() {
  try {
    const response = await fetch(GOOGLE_SHEET_CSV_URL);
    if (!response.ok) throw new Error();
    const data = await response.text();
    products = parseCSV(data);
    filterProducts();
  } catch (error) {
    document.getElementById('product-grid').innerHTML = '<div class="no-results">ระบบกำลังโหลดข้อมูล กรุณาตรวจสอบว่า Google Sheets ตั้งค่าเผยแพร่ไปยังเว็บแล้วหรือยังนะครับ</div>';
  }
}

function parseCSV(text) {
  const lines = text.split('\n');
  if (lines.length <= 1) return [];
  
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
  const list = [];
  
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    
    const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/"/g, ''));
    const obj = {};
    
    headers.forEach((header, index) => {
      if (currentLine[index] !== undefined) {
        obj[header] = currentLine[index];
      }
    });
    
    if (!obj.name && !obj.cat) continue;
    
    const itemLength = obj.length || obj.lengt || '—';
    
    list.push({
      id: obj.id || '',
      cat: obj.cat || 'อื่นๆ',
      name: obj.name || 'ไม่มีชื่อสินค้า',
      size: obj.size || '—',
      chest: obj.chest || '—',
      length: itemLength,
      code: obj.code || '',
      img: obj.img || '',
      price: obj.price || null,
      ig: obj.ig || '' // ดึงค่าจากคอลัมน์ J (ช่อง ig) ของกูเกิลชีต
    });
  }
  return list;
}

function initCats() {
  const inner = document.getElementById('cat-inner');
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c === selectedCat ? ' active' : '');
    btn.textContent = CAT_LABELS[c] || c;
    btn.dataset.cat = c;
    btn.onclick = () => { selectedCat = c; updateCatBtns(); filterProducts(); };
    inner.appendChild(btn);
  });
}
function updateCatBtns() {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === selectedCat));
}

const SIZES = ['S','M','L','XL','2XL','3XL','4XL'];
function initSizes() {
  const wrap = document.getElementById('size-filters');
  SIZES.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'size-btn';
    btn.textContent = s;
    btn.dataset.size = s;
    btn.onclick = () => {
      selectedSize = selectedSize === s ? '' : s;
      document.querySelectorAll('.size-btn').forEach(b => b.classList.toggle('active', b.dataset.size === selectedSize));
      document.getElementById('clear-size').classList.toggle('visible', !!selectedSize);
      filterProducts();
    };
    wrap.appendChild(btn);
  });
}
function clearSize() {
  selectedSize = '';
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('clear-size').classList.remove('visible');
  filterProducts();
}

function filterProducts() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const filtered = products.filter(p => {
    if (String(p.price).includes('ขายแล้ว') || String(p.name).includes('ขายแล้ว')) return false;
    if (selectedCat !== 'ทั้งหมด' && p.cat !== selectedCat) return false;
    if (selectedSize && p.size !== selectedSize) return false;
    if (q) {
      const blob = [p.name, p.cat, p.size, p.code].join(' ').toLowerCase();
      return blob.includes(q);
    }
    return true;
  });
  
  renderGrid(filtered);
  document.getElementById('result-count').textContent = filtered.length + ' ชิ้น';
}

function renderGrid(list) {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = '';
  if (!list.length) {
    grid.innerHTML = '<div class="no-results"><p>ไม่พบสินค้าที่ตรงกัน</p></div>';
    return;
  }
  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.onclick = () => openModal(p);
    const hasImg = p.img && p.img.startsWith('http');
    const isNumericPrice = p.price && !isNaN(p.price);
    card.innerHTML = `
      <div class="card-img">
        ${hasImg
          ? `<img src="${p.img}" alt="${p.name}">`
          : `<div class="card-img-placeholder"><span>คลิกดูรายละเอียด</span></div>`
        }
        <span class="card-size-tag">${p.size}</span>
      </div>
      <div class="card-body">
        <div class="card-cat">${CAT_LABELS[p.cat] || p.cat}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-meta">
          <span class="card-dims">อก ${p.chest}" · ยาว ${p.length}"</span>
          ${isNumericPrice ? `<span class="card-price">฿${p.price}</span>` : `<span class="card-price no-price">${p.price || 'ถามราคา'}</span>`}
        </div>
        ${p.code ? `<div class="card-id">รหัส: ${p.code}</div>` : ''}
      </div>`;
    grid.appendChild(card);
  });
}

function openModal(p) {
  document.getElementById('modal-cat').textContent = CAT_LABELS[p.cat] || p.cat;
  document.getElementById('modal-name').textContent = p.name;
  document.getElementById('m-size').textContent = p.size;
  document.getElementById('m-chest').textContent = p.chest + (p.chest !== '—' && !p.chest.includes('"') ? '"' : '');
  document.getElementById('m-length').textContent = p.length + (p.length !== '—' && !p.length.includes('"') ? '"' : '');
  
  const isNumericPrice = p.price && !isNaN(p.price);
  document.getElementById('m-price').textContent = isNumericPrice ? '฿' + p.price : (p.price || 'สอบถามราคา');
  document.getElementById('m-code').textContent = p.code ? 'รหัส: ' + p.code : '';

  const imgEl = document.getElementById('modal-img');
  const placeholder = document.getElementById('modal-placeholder');
  const igBtnWrap = document.getElementById('ig-btn-container');
  const igLink = document.getElementById('modal-ig-link');

  const oldImg = imgEl.querySelector('img');
  if (oldImg) oldImg.remove();

  if (p.img && p.img.startsWith('http')) {
    placeholder.style.display = 'none';
    const img = document.createElement('img');
    img.src = p.img;
    imgEl.insertBefore(img, imgEl.firstChild);
  } else {
    placeholder.style.display = 'flex';
  }

  // ตัวเช็กและเปิดปุ่ม "ดูเพิ่มเติมในไอจี"
  if (p.ig && p.ig.trim().startsWith('http')) {
    igBtnWrap.classList.add('visible');
    igLink.href = p.ig.trim();
  } else {
    igBtnWrap.classList.remove('visible');
  }

  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('open');
}

initCats();
initSizes();
loadProductsFromSheet();
</script>
</body>
</html>
